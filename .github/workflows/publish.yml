name: Publish to GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend-contract
        uses: actions/checkout@v6

      # Install + build/test against the public npm registry (default). We only
      # point npm at GitHub Packages right before `npm publish`, so resolving
      # public deps here is unaffected.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Use npm 11
        run: npm install -g npm@^11.10.0

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: github.event_name == 'release'
        run: |
          node -e 'const pkg = require("./package.json"); const expected = "v" + pkg.version; const actual = process.env.GITHUB_REF_NAME; if (actual !== expected) { console.error("Tag " + actual + " does not match package version " + expected); process.exit(1); }'

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure npm for GitHub Packages
        # Write to $HOME/.npmrc so the auth token is picked up at publish time
        # without changing the default registry used for install/build above.
        run: |
          echo "//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}" > $HOME/.npmrc
          echo "@lastshotlabs:registry=https://npm.pkg.github.com" >> $HOME/.npmrc
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to public npm
        # The `@lastshotlabs` scope mapping — not publishConfig — decides where a
        # scoped package is published, so repoint the scope at npmjs (this
        # overwrites the GitHub Packages npmrc, hence running after that step).
        # --access public is required for a scoped package to be publicly installable.
        run: |
          echo "@lastshotlabs:registry=https://registry.npmjs.org" > $HOME/.npmrc
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" >> $HOME/.npmrc
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
